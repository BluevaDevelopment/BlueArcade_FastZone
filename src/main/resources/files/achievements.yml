      1:
        name: "First dash"
        description:
          - "Play your first Fast Zone game."
        conditions:
          - "{bluearcade_stat_module_fast_zone_games_played} >= 1"
        rewards:
          commands:
            - "arcadeadmin credits give {player} 10"
            - "arcadeadmin xp give {player} 10"
