# Fast Zone Module - English (UK)
# Only Fast Zone-specific content

file_version: 1
display_name: "Fast Zone"

description:
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
  - "<green>Game</green> <gray>-</gray> <yellow><bold>Fast Zone</bold></yellow>"
  - " "
  - "<white>Description:</white>"
  - "<gray>Sprint at ridiculous speed toward the finish line.</gray>"
  - "<gray>Dodge walls and hazards—one crash can end your run.</gray>"
  - " "
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"

# Vote menu
vote_menu:
  name: "<green>Fast Zone</green>"
  lore:
    - "<gray>Lightning-fast sprint to the goal.</gray>"
    - "<gray>Smash a wall and you're out.</gray>"
    - ""
    - "<white>{votes}</white> <gray>votes.</gray>"

stats:
  labels:
    finish_line_crosses: "Zone finishes"
    games_played: "Fast Zone games played"
    wins: "Fast Zone wins"

messages:
  respawned: "<yellow>You have been respawned!</yellow>"
  deaths:
    death_block:
      - "<dark_red>✘</dark_red> <red>{player}</red> <gray>triggered a hazard tile.</gray>"
      - "<dark_red>✘</dark_red> <red>{player}</red> <gray>stepped on a deadly block.</gray>"
      - "<dark_red>✘</dark_red> <red>{player}</red> <gray>tripped a trap block.</gray>"
    void:
      - "<dark_red>✘</dark_red> <red>{player}</red> <gray>ran off the track.</gray>"
      - "<dark_red>✘</dark_red> <red>{player}</red> <gray>missed the lane and had to reset.</gray>"
      - "<dark_red>✘</dark_red> <red>{player}</red> <gray>lost control and left the course.</gray>"
    wall:
      - "<dark_red>✘</dark_red> <red>{player}</red> <gray>slammed into a wall at full speed.</gray>"
      - "<dark_red>✘</dark_red> <red>{player}</red> <gray>couldn't dodge a wall and was eliminated.</gray>"
      - "<dark_red>✘</dark_red> <red>{player}</red> <gray>crashed into the barrier.</gray>"
  finish:
    crossed:
      - "<dark_green>✔</dark_green> <green>{player}</green> <gray>blazed through the finish at</gray> <yellow>#{position}</yellow><gray>!</gray>"
      - "<dark_green>✔</dark_green> <green>{player}</green> <gray>claimed spot</gray> <yellow>#{position}</yellow> <gray>at the end of the lane!</gray>"
      - "<dark_green>✔</dark_green> <green>{player}</green> <gray>rocketed to</gray> <yellow>#{position}</yellow> <gray>place!</gray>"

titles:
  finished:
    title: "<bold><gradient:dark_green:green>FINISHED!</gradient></bold>"
    subtitle: "<white>You finished in position</white> <yellow>#{position}</yellow>"

scoreboard:
  title: "<bold><gradient:aqua:light_purple>Blue Arcade</gradient></bold>"
  lines:
    - ""
    - "<white>Arena:</white> <aqua>{arena}</aqua>"
    - "<white>Game:</white> <aqua>Fast Zone</aqua>"
    - "<white>Time:</white> <aqua>{time}</aqua>"
    - ""
    - "<green>➊</green> <white>{place_1}</white> <gray>{distance_1}m</gray>"
    - "<gold>➋</gold> <white>{place_2}</white> <gray>{distance_2}m</gray>"
    - "<red>➌</red> <white>{place_3}</white> <gray>{distance_3}m</gray>"
    - "<dark_gray>➍</dark_gray> <gray>{place_4}</gray> <dark_gray>{distance_4}m</dark_gray>"
    - "<dark_gray>➎</dark_gray> <gray>{place_5}</gray> <dark_gray>{distance_5}m</dark_gray>"
    - ""
    - "<aqua>Your Position:</aqua> <white>#{fast_zone_position}</white>"
    - ""
    - "<yellow>www.blueva.net</yellow>"

setup_messages:
  set_success: "{prefix} <green>Finish line set: {blocks} blocks ({x}×{y}×{z})</green>"
  must_use_stick: "{prefix} <red>Use the Magic Stick to select the finish line area first.</red>"
  not_configured: "{prefix} <red>Finish line is not configured! Use /baa game {arena_id} fast_zone finishline set</red>"
  usage_finish_line: "{prefix} <yellow>Usage: /baa game <id> <minigame> finishline set</yellow>"
